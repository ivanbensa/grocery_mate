<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">      <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="css/style.css">                                                                <!-- Custom CSS -->
    <title>Sous Chef</title>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
    <img src="images/js-avengers-logo.png" alt="Loading">
    <h1 id="loadingText">0%</h1>
</div>
<!-- END OF LOADING SCREEN -->

<!-- MAIN APPLICATION CONTENT -->
<main class="container-fluid p-4">

    <div class="row g-4">

        <!-- DAILY PLATE -->
        <section class="col-12 col-lg-4">
            <div class="app-card h-100">
                <h4><span class="section-number">1</span> Daily Plate</h4>

                <div class="d-flex justify-content-between align-items-center my-4">
                    <i class="fa-solid fa-chevron-left cursor-pointer" onclick="toPrevDay()"></i>
                    <strong id="selectedDayLabel"></strong>
                    <i class="fa-solid fa-chevron-right cursor-pointer" onclick="toNextDay()"></i>
                </div>

                <div id="weeklyItemsContainer"></div>
                <div class="d-flex gap-2 mt-2">
                    <button onclick="showSelectedDayGroupedIngredients()" class="btn btn-outline-secondary me-2">
                        <i class="fa-solid fa-plus me-2"> </i>
                        Calculate ingredients
                    </button>
                    <button onclick="checkIngredientsAndGenerateShoppingList()" class="btn btn-success">
                        <i class="fa-solid fa-list-check me-1"></i>
                        Check Stock & Shop
                    </button>
                </div>
            </div>
        </section>
        <!-- END OF DAILY PLATE -->



        <!-- COOK BOOK -->

        <section class="col-12 col-lg-8">
            <div class="app-card">  <!--CSS - COOK BOOK -->

                <h3 class="mb-4">
                    <span class="section-number">2</span>   <!--CSS - REUSABLE CLASSES-->
                    CookBook
                </h3>

                <div class="row g-4">

                    <!-- LEFT SIDE: SEARCH + RECIPES -->
                    <div class="col-lg-8">

                        <!-- RECIPE SEARCH -->
                        <div class="mb-4 border-bottom pb-4">
                            <h4 class="mb-4">Recipe Search</h4>

                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Search</label>
                                    <input
                                            type="text"
                                            class="form-control"
                                            id="searchRecipeInput"
                                            placeholder="Search recipes..."
                                    >
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">Country</label>
                                    <select class="form-select" id="countrySelect">
                                        <option value="all">🌍 All Countries</option>
                                        <option value="Serbia">🇷🇸 Serbia</option>
                                        <option value="Ukraine">🇺🇦 Ukraine</option>
                                        <option value="Russia">🇷🇺 Russia</option>
                                        <option value="Lebanon">🇱🇧 Lebanon</option>
                                        <option value="India">🇮🇳 India</option>
                                        <option value="Other">🌐 Other</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label">Category</label>
                                    <select class="form-select" id="categorySelect">
                                        <option value="all">🍽️ All Categories</option>
                                        <option value="breakfast">🍳 Breakfast</option>
                                        <option value="lunch">🍗 Lunch</option>
                                        <option value="dinner">🍲 Dinner</option>
                                    </select>
                                </div>

                            </div>
                        </div>
                        <!-- END OF RECIPE SEARCH -->

                        <!-- RECIPES -->
                        <div>
                            <h4 class="mb-4">Recipes</h4>
                            <div class="row g-3 recipes-scroll" id="recipesContainer">
                                <!-- JS recipes here -->
                            </div>
                        </div>
                        <!-- END OF RECIPES -->
                    </div>
                    <!-- END OF LEFT SIDE: SEARCH + RECIPES -->

                    <!-- RIGHT SIDE: ADD RECIPE -->
                    <div class="col-lg-4">

                        <h4 class="mb-4">Add Recipe</h4>

                        <input
                                type="text"
                                class="form-control mb-3"
                                id="newRecipeName"
                                placeholder="Recipe name"
                        >

                        <select class="form-select mb-3" id="newRecipeCountry">
                            <option value="">Select Country 👇</option>
                            <option value="Serbia">🇷🇸 Serbia</option>
                            <option value="Ukraine">🇺🇦 Ukraine</option>
                            <option value="Russia">🇷🇺 Russia</option>
                            <option value="Lebanon">🇱🇧 Lebanon</option>
                            <option value="India">🇮🇳 India</option>
                            <option value="Other">🌐 Other</option>
                        </select>

                        <select class="form-select mb-3" id="newRecipeCategory">
                            <option value="">Select Category 👇</option>
                            <option value="breakfast">🍳 Breakfast</option>
                            <option value="lunch">🍗 Lunch</option>
                            <option value="dinner">🍲 Dinner</option>
                        </select>

                        <input
                                type="url"
                                class="form-control mb-3"
                                id="newRecipeImage"
                                placeholder="Paste image URL..."
                        >

                        <h6>Ingredients</h6>

                        <input
                                type="text"
                                class="form-control mb-2"
                                id="ingredientName"
                                placeholder="Ingredient name"
                        >

                        <div class="row g-2 mb-3">

                            <div class="col-6">
                                <input
                                        type="number"
                                        class="form-control"
                                        id="ingredientQuantity"
                                        placeholder="Quantity"
                                >
                            </div>

                            <div class="col-6">
                                <select class="form-select" id="ingredientUnit">
                                    <option value="g">g</option>
                                    <option value="ml">ml</option>
                                    <option value="piece">piece</option>
                                </select>
                            </div>

                        </div>

                        <button
                                class="btn btn-outline-success w-100 mb-3"
                                id="addIngredientBtn"
                        >
                            Add Ingredient
                        </button>

                        <ul class="small" id="ingredientsPreview"></ul>

                        <textarea
                                class="form-control mb-3"
                                id="newRecipeInstructions"
                                rows="5"
                                placeholder="Write instructions. One step per line."
                        ></textarea>

                        <button
                                class="btn btn-success w-100"
                                id="saveRecipeBtn"
                        >
                            Save Recipe
                        </button>

                    </div>
                    <!-- END OF RIGHT SIDE -->

                </div>
            </div>

        </section>

        <!-- RECIPE MODAL -->
        <div class="modal fade" id="recipeModal" tabindex="-1">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content" id="recipeModalContent">
                    <!-- JS modal content -->
                </div>
            </div>
        </div>
        <!-- END OF RECIPE MODAL -->

        <!-- END OF COOK BOOK -->


        <!-- MY SHELF -->
        <section class="col-12 col-lg-6">
            <div class="app-card h-100">
                <div class="d-flex justify-content-between align-items-center">
                    <h4><span class="section-number">3</span> My Shelf</h4>
                    <button class="btn btn-outline-danger btn-sm" id="invClearBtn">Clear All</button>
                </div>

                <button class="btn btn-outline-success my-4" id="invAddBtn">
                    <i class="fa-solid fa-plus me-2"></i>
                    Add Item
                </button>

                <div id="invFormContainer"></div>

                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Unit</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>

                    <tbody id="invTableBody">
                    <!--
                    <tr>
                        <td></td>
                        <td></td>
                        <td class="text-end">
                            <i class="fa-solid fa-pen me-3"></i>
                            <i class="fa-regular fa-trash-can text-danger"></i>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td></td>
                        <td class="text-end">
                            <i class="fa-solid fa-pen me-3"></i>
                            <i class="fa-regular fa-trash-can text-danger"></i>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td></td>
                        <td class="text-end">
                            <i class="fa-solid fa-pen me-3"></i>
                            <i class="fa-regular fa-trash-can text-danger"></i>
                        </td>
                    </tr>

                    <tr>
                        <td></td>
                        <td></td>
                        <td class="text-end">
                            <i class="fa-solid fa-pen me-3"></i>
                            <i class="fa-regular fa-trash-can text-danger"></i>
                        </td>
                    </tr>
                    -->
                    </tbody>
                </table>
            </div>
        </section>
        <!-- END OF MY SHELF -->

        <!-- CART -->
        <section class="col-12 col-lg-6">
            <div class="app-card h-100">
                <!--
                <div class="d-flex justify-content-between align-items-center cart-header">
                    <h4><span class="section-number">4</span> Cart</h4>
                    <button class="btn btn-outline-success my-4" id="ShoppingDoneBtn">Shopping done</button>
                    <button class="btn btn-outline-danger my-4" id="shoppingclearBtn">Clear All</button>
                </div>
                -->

                <div class="cart-header d-flex justify-content-between align-items-center">

                    <h4>
                        <span class="section-number">4</span>
                        Cart
                    </h4>

                    <div class="cart-buttons">
                        <button class="btn btn-outline-success btn-sm" id="ShoppingDoneBtn">
                            Shopping done
                        </button>

                        <button class="btn btn-outline-danger btn-sm" id="shoppingclearBtn">
                            Clear All
                        </button>
                    </div>

                </div>

                <button class="btn btn-outline-success my-4" id="addToShoppingListBtn">
                    <i class="fa-solid fa-plus me-2"></i>
                    Add Item
                </button>

                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Unit</th>
                        <th class="text-end">Actions</th>
                    </tr>
                    </thead>

                    <tbody id="shoppingTableBody">
                    <!-- <tr>
                        <td></td>
                        <td></td>
                        <td class="text-end">
                            <i class="fa fa-check"></i>
                            <i class="fa-solid fa-pen me-3"></i>
                            <i class="fa-regular fa-trash-can text-danger"></i>
                        </td>
                    </tr> -->
                    </tbody>
                </table>
            </div>
        </section>
        <!-- END OF CART -->
    </div>
</main>
<!-- END OF MAIN APPLICATION CONTENT -->

<!-- APP MESSAGE MODAL -->

<div class="modal fade" id="appModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="appModalTitle"></h5>
                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                ></button>
            </div>
            <div class="modal-body" id="appModalBody"></div>
            <div class="modal-footer">
                <button
                        type="button"
                        class="btn btn-success"
                        data-bs-dismiss="modal"
                >
                    OK
                </button>
            </div>
        </div>
    </div>
</div>

<!-- END OF APP MESSAGE MODAL -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script src="js/recipes.js"></script>
<script src="js/recepieManagment.js"></script>
<script src="js/inventory.js"></script>
<script src="js/shoppingList.js"></script>
<script src="js/weeklyPlan.js"></script>
</body>
</html>
